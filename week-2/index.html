<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: darkblue;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border: 2px solid blue;
            border-radius: 10px;
        }

        .btn {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome</h1>

        <p>
            This is my first webpage created using HTML5 and CSS3.
            It contains basic elements like headings, paragraphs,
            buttons, and simple styling.
        </p>

        <button class="btn">Click Me</button>
    </div>

</body>
</html>
